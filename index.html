<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Mapulauquen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.09);
    --border2: rgba(0,0,0,0.15);
    --text: #1a1a18;
    --text2: #6b6b66;
    --text3: #9e9e98;
    --radius: 10px;
    --booking-bg: #ddeeff;
    --booking-tx: #0a3d6b;
    --airbnb-bg: #ffd6e0;
    --airbnb-tx: #6b0a2a;
    --wa-bg: #d4f5e4;
    --wa-tx: #0a4a28;
    --alianza-bg: #e8e4fc;
    --alianza-tx: #2a1f6b;
    --otro-bg: #e8e6df;
    --otro-tx: #3a3a36;
    --today: rgba(55,138,221,0.08);
    --today-th: rgba(55,138,221,0.15);
    --wk: rgba(0,0,0,0.03);
    --wk-th: rgba(0,0,0,0.05);
    --accent: #2d6a4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
  }

  .page {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px 48px;
  }

  /* Header */
  .page-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo-block { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text h1 { font-size: 18px; font-weight: 500; letter-spacing: -0.3px; }
  .logo-text p { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .status-chip {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; padding: 5px 12px;
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    background: var(--surface);
    color: var(--text2);
  }
  .status-chip.ok { color: #0a4a28; background: var(--wa-bg); border-color: #a8dfc0; }
  .status-chip.err { color: #6b0a0a; background: #ffdede; border-color: #f0a0a0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; padding: 5px 14px;
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--surface2); }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-val { font-size: 24px; font-weight: 500; color: var(--text); line-height: 1; }
  .stat-sub { font-size: 10px; color: var(--text3); margin-top: 4px; }

  /* Calendar controls */
  .cal-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .month-nav { display: flex; align-items: center; gap: 6px; }
  .nav-btn {
    font-family: 'DM Sans', sans-serif;
    width: 30px; height: 30px;
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--surface2); }
  .month-label { font-size: 16px; font-weight: 500; min-width: 150px; text-align: center; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .leg-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .table-scroll { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; min-width: 800px; }

  th, td { border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); }
  th:last-child, td:last-child { border-right: none; }

  th.cabin-col, td.cabin-col {
    position: sticky; left: 0; z-index: 2;
    background: var(--surface);
    min-width: 120px; max-width: 120px;
    padding: 6px 10px;
    border-right: 1px solid var(--border2);
  }
  th.cabin-col {
    background: var(--surface2);
    z-index: 3;
    font-size: 10px;
    font-weight: 400;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  th.day-col {
    min-width: 34px; width: 34px;
    padding: 5px 2px;
    text-align: center;
    font-size: 10px;
    font-weight: 400;
    color: var(--text3);
    background: var(--surface2);
    white-space: nowrap;
    line-height: 1.3;
  }
  th.day-col.wk { background: var(--wk-th); }
  th.day-col.today { background: var(--today-th); color: #185FA5; font-weight: 500; }

  td.day-cell {
    min-width: 34px; width: 34px;
    height: 28px;
    text-align: center;
    vertical-align: middle;
    padding: 0;
    position: relative;
  }
  td.day-cell.wk { background: var(--wk); }
  td.day-cell.today { background: var(--today); }

  .cabin-name { font-size: 11px; font-weight: 500; color: var(--text); }
  .cabin-id { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; }

  .pill {
    display: block;
    font-size: 9px;
    font-weight: 500;
    padding: 2px 0;
    width: 100%;
    height: 100%;
    line-height: 24px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    cursor: default;
  }

  /* Tooltip */
  .tip-wrap { position: relative; width: 100%; height: 100%; }
  .tip-wrap:hover .tip { display: block; }
  .tip {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: #fff;
    border-radius: 8px;
    padding: 8px 12px;
    white-space: nowrap;
    font-size: 11px;
    z-index: 200;
    pointer-events: none;
    line-height: 1.6;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .tip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--text);
  }
  .tip b { font-weight: 500; display: block; margin-bottom: 2px; }
  .tip-tag {
    display: inline-block;
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 10px;
    margin-top: 4px;

  /* Special events */
  .special-cell {
    background: #fff8e6 !important;
    font-size: 8px;
    color: #7a5000;
    font-weight: 500;
    text-align: center;
    line-height: 28px;
    overflow: hidden;

  .last-update {
    font-size: 10px;
    color: var(--text3);
    text-align: right;
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
  }

  /* Error state */
  .err-state {
    padding: 32px;
    text-align: center;
    color: var(--text2);
    line-height: 1.7;
  }
  .err-state strong { display: block; color: var(--text); font-size: 14px; margin-bottom: 8px; }

  @media (max-width: 600px) {
    .page { padding: 16px 12px 32px; }
    .page-header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>

function getColor(canal) {
  if (!canal) return COLORS.otro;
  const l = canal.toLowerCase();
  if (l.includes('booking'))  return COLORS.booking;
  if (l.includes('airbnb'))   return COLORS.airbnb;
  if (l.includes('whatsapp')) return COLORS.whatsapp;
  if (l.includes('alianza'))  return COLORS.alianza;
  if (l.includes('expedia'))  return COLORS.expedia;
  return COLORS.otro;
}

function parseDate(s) {
  if (!s || !s.trim()) return null;
  const p = s.trim().split('/');
  if (p.length !== 3) return null;
  const d = new Date(parseInt(p[2]), parseInt(p[1]) - 1, parseInt(p[0]));
  return isNaN(d.getTime()) ? null : d;
}

function splitCSVLine(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') { inQ = !inQ; }
    else if (line[i] === ',' && !inQ) { res.push(cur.trim()); cur = ''; }
    else cur += line[i];
  }
  res.push(cur.trim());
  return res;
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const hdrs = splitCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = splitCSVLine(lines[i]);
    if (!vals[0]) continue;
    const o = {};
    hdrs.forEach((h, j) => o[h] = vals[j] || '');
    rows.push(o);
  }
  return rows;
}

function rowsToReservas(rows) {
  return rows.reduce((acc, r) => {
    const canal   = r['Canal'] || '';
    const id      = r['ID Cabaña'] || r['ID_Cabaña'] || '';
    const llegada = r['Fecha de Llegada'] || '';
    const salida  = r['Fecha de Salida'] || '';
    if (!canal || !id || !llegada || !salida) return acc;
    const ll = parseDate(llegada);
    const sa = parseDate(salida);
    if (!ll || !sa) return acc;
    acc.push({
      canal, id, llegada, salida, ll, sa,
      cliente: r['Nombre Cliente'] || '',
      estado:  r['Estado de Reserva Interna'] || '',
      noches:  parseInt(r['Q de Noches'] || '0') || 0,
      adultos: parseInt(r['Q de Adultos'] || '0') || 0,
    });
    return acc;
  }, []);
}

function setStatus(msg, type) {
  document.getElementById('status-txt').textContent = msg;
  document.getElementById('status-chip').className = 'status-chip' + (type ? ' ' + type : '');
}

async function tryFetch(url) {
  for (let i = 0; i < PROXIES.length; i++) {
    setStatus(`Conectando (${i + 1}/${PROXIES.length})...`, '');
    try {
      const r = await fetch(PROXIES[i](url), { signal: AbortSignal.timeout(9000) });
      if (!r.ok) continue;
      const text = await r.text();
      if (text.trim().startsWith('<') || text.length < 50) continue;
      return text;
    } catch (e) { continue; }
  }
  return null;
}

async function loadData() {
  setStatus('Conectando...', '');
  const text = await tryFetch(CSV_URL);
  if (!text) {
    setStatus('Sin conexión — datos del ' + new Date().toLocaleDateString('es-CL'), 'err');
    if (reservas.length === 0) loadFallback();
    render();
    return;
  }
  try {
    const rows = parseCSV(text);
    const res  = rowsToReservas(rows);
    if (res.length === 0) throw new Error('0 reservas parseadas');
    reservas = res;
    setStatus('Actualizado · ' + res.length + ' reservas', 'ok');
    document.getElementById('last-update').textContent =
      'Última actualización desde Google Sheets: ' + new Date().toLocaleString('es-CL');
    render();
  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
    loadFallback();
    render();
  }
}

}

function buildOcc(year, month) {
  const dim = new Date(year, month + 1, 0).getDate();
  const map = {};
  CABANAS.forEach(c => { map[c.id] = {}; });
  for (let d = 1; d <= dim; d++) {
    const cur = new Date(year, month, d);
    reservas.forEach(r => {
      if (cur >= r.ll && cur < r.sa) {
        if (!map[r.id]) map[r.id] = {};
        if (!map[r.id][d]) map[r.id][d] = [];
        map[r.id][d].push(r);
      }
    });
  }
  return map;
}

function render() {
  const dim   = new Date(curY, curM + 1, 0).getDate();
  const occ   = buildOcc(curY, curM);
  const today = new Date();

  document.getElementById('month-label').textContent = MONTH_NAMES[curM] + ' ' + curY;

  // Stats
  let totalN = 0, cC = {};
  CABANAS.filter(c => c.id !== 'MPS1').forEach(cab => {
    for (let d = 1; d <= dim; d++) {
      if (occ[cab.id] && occ[cab.id][d]) {
        totalN++;
        const canal = occ[cab.id][d][0].canal;
        cC[canal] = (cC[canal] || 0) + 1;
      }
    }
  });
  const ocp   = Math.round((totalN / (10 * dim)) * 100);
  const topC  = Object.entries(cC).sort((a, b) => b[1] - a[1])[0];
  const totalR = reservas.filter(r => {
    return r.ll <= new Date(curY, curM + 1, 0) && r.sa >= new Date(curY, curM, 1);
  }).length;

  document.getElementById('s-noches').textContent = totalN;
  document.getElementById('s-ocp').textContent    = ocp + '%';
  document.getElementById('s-canal').textContent  = topC ? topC[0] : '—';
  document.getElementById('s-canal-sub').textContent = topC ? topC[1] + ' noches' : '';
  document.getElementById('s-res').textContent    = totalR;

  // Table
  let html = '<table><thead><tr><th class="cabin-col">Cabaña</th>';
  for (let d = 1; d <= dim; d++) {
    const dow  = new Date(curY, curM, d).getDay();
    const isWk = dow === 0 || dow === 6;
    const isT  = today.getFullYear() === curY && today.getMonth() === curM && today.getDate() === d;
    html += `<th class="day-col${isWk ? ' wk' : ''}${isT ? ' today' : ''}">${d}<br>${DAY_NAMES[dow]}</th>`;
  }
  html += '</tr></thead><tbody>';

  CABANAS.forEach(cab => {
    html += `<tr><td class="cabin-col">
      <div class="cabin-name">${cab.name}</div>
      <div class="cabin-id">${cab.id}</div>
    </td>`;

    for (let d = 1; d <= dim; d++) {
      const dow  = new Date(curY, curM, d).getDay();
      const isWk = dow === 0 || dow === 6;
      const isT  = today.getFullYear() === curY && today.getMonth() === curM && today.getDate() === d;
      const rs   = occ[cab.id] && occ[cab.id][d];

      if (rs && rs.length > 0) {
        const r   = rs[0];
        const col = getColor(r.canal);
        const lbl = r.canal.replace(/whatsapp/i, 'WA').replace(/booking/i, 'Book').substring(0, 7);
        const estadoTag = {
          'Pagada':   '#d4f5e4',
          'Abonada':  '#fff3d4',
          'En Curso': '#ddeeff',
          'Cortesía': '#ede4fc',
        }[r.estado] || '#e8e6df';

        html += `<td class="day-cell${isWk ? ' wk' : ''}${isT ? ' today' : ''}" style="background:${col.bg}">
          <div class="tip-wrap">
            <span class="pill" style="color:${col.tx}">${lbl}</span>
            <div class="tip">
              <b>${r.cliente || '—'}</b>
              ${r.canal} · ${r.llegada} → ${r.salida}<br>
              ${r.noches} noche(s) · ${r.adultos} pax
              <span class="tip-tag" style="background:${estadoTag};color:#333">${r.estado}</span>
            </div>
          </div>
        </td>`;
      } else {
        html += `<td class="day-cell${isWk ? ' wk' : ''}${isT ? ' today' : ''}"></td>`;
      }
    }
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('cal-table').innerHTML = html;
}

function changeMonth(delta) {
  curM += delta;
  if (curM > 11) { curM = 0; curY++; }
  if (curM < 0)  { curM = 11; curY--; }
  render();
}

// Init
render();
loadData();
</script>
</body>
</html>
